databases:
  - name: supportflow-db

services:
  - type: web
    name: supportflow-ai
    runtime: python

    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"

    startCommand: "gunicorn supportflow.wsgi:application"

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: supportflow.settings

      - key: DATABASE_URL
        fromDatabase:
          name: supportflow-db
          property: connectionString

      - key: GEMINI_API_KEY
        sync: false

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"
